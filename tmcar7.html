<!DOCTYPE html>
<html>

<body>
    <a href="tmin.html" style="color: white; font-size: 30px; margin: 15px">Назад</a><br><br>
    <h1 align="center"><span style="color: white;">BMW M5 E60 rest</span></h1>
    <div class="image">
    <img src="in2.png">
    </div>
    <p align="center" style="color: white; font-size: 20px;">BMW M5 E60 rest — модель 4-го поколения седана BMW M5, выпускавшаяся с 2005 по 2010 год. <br>В 2007 году состоялся рестайлинг — автомобиль получил кормовую светодиодную оптику и обновил фары дневного света</p>
    <h2 align="center" style="color: white; margin: 0px;">Цена: 2.000.000 ₽</span></h2>
    <table>
        <tr>
            <td width="50%" valign="top">

                    <input type="text" required size="25" pattern="[А-ЯЁ][а-яё]+\s[А-ЯЁ][а-яё]+\s[А-ЯЁ][а-яё]+" placeholder="Фамилия Имя Отчество"><br><br>

                    </select><br><br>

                    Цвет:<br>
                    <select required>
                        <option value="">Выберите</option>
                        <option>Черный</option>
                        <option>Белый</option>
                        <option>Синий</option>
                        <option>Красный</option>
                        <option>Зеленый</option>
                    </select><br><br>
                    <input type="submit" value="Отправить">
                </form>
            </td>
        </tr>
    </table>

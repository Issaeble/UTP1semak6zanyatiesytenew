<!DOCTYPE html>
<html>
<head>
    <title>Интернет магазин</title>
    <style>
        body { background: none; }
        .image { margin-left: 900px; margin-bottom: 50px; margin-top: 50px; border-radius: 20px; border: 4px solid green; border-radius: 15px; width: 700px; height: 400px;}
        .image img { width: 700px; height: 400px; }
    </style>
</head>
<body>
    <a href="ot.html" style="color: black; font-size: 30px; margin: 15px">Назад</a><br><br>
    <h1 align="center"><span style="color: black;">УАЗ Патриот</span></h1>
    <div class="image">
    <img src="ot3.png">
    </div>
    <p align="center" style="color: black; font-size: 20px;">УАЗ «Патриот» — внедорожник Ульяновского автозавода, впервые представленный<br> в 2005 году как УАЗ-3163. К 2025 году модель получила третий рестайлинг.</p>
    <h2 align="center" style="color: black; margin: 0px;">Цена: 900.000 ₽</h2>
    <table>
        <tr>
            <td width="50%" valign="top">
                <form style="background: grey; margin-top: 10px; margin-left: 1100px; padding: 25px; width: 250px; height: 250px;">
                    <b>Заявка на покупку</b><br><br>
                    ФИО:<br>
                    <input type="text" required size="25" pattern="[А-ЯЁ][а-яё]+\s[А-ЯЁ][а-яё]+\s[А-ЯЁ][а-яё]+" placeholder="Фамилия Имя Отчество"><br><br>

                    Город:<br>
                    <select required>
                        <option value="">Выберите</option>
                        <option>Калуга</option>
                        <option>Москва</option>
                        <option>Санкт-Петербург</option>
                        <option>Ростов-На-Дону</option>
                    </select><br><br>

                    Цвет:<br>
                    <select required>
                        <option>Черный</option>
                        <option>Белый</option>
                        <option>Синий</option>
                        <option>Красный</option>
                        <option>Зеленый</option>
                    </select><br><br>
                    <input type="submit" value="Отправить">
                </form>
            </td>
        </tr>
    </table>
</body>
</html>
